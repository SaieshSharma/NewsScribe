name: NewsScribe Continuous Deployment Loop

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Authenticate to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Light App Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/newsscribe-backend:latest

      - name: Execute Live Remote Server Swap via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          envs: DOCKER_USER
          script: |
            # 1. Safely handle any container hogging port 8000
            echo "Checking for port 8000 hogging layers..."
            OLD_PORT_CONTAINER="$(docker ps -q --filter "publish=8000")"
            if [ -n "$OLD_PORT_CONTAINER" ]; then
              docker rm -f "$OLD_PORT_CONTAINER"
            fi

            # 2. Conditional check for existing name target to avoid stderr noise
            echo "Checking for existing container name layers..."
            if docker ps -a --format '{{.Names}}' | grep -qx 'newsscribe-backend-inst'; then
              docker rm -f newsscribe-backend-inst
            else
              echo "Container newsscribe-backend-inst does not exist; continuing safely."
            fi
            
            # 3. Conditional check for old image layer to bypass cache-pull tricks safely
            echo "Checking for cached infrastructure images..."
            if docker image inspect "$DOCKER_USER/newsscribe-backend:latest" >/dev/null 2>&1; then
              docker rmi -f "$DOCKER_USER/newsscribe-backend:latest"
            else
              echo "No cached image found on disk; continuing safely."
            fi
            
            # 4. Pull down the reverted/fresh deployment code layer
            echo "Pulling down clean application build layer..."
            docker pull $DOCKER_USER/newsscribe-backend:latest
            
            # 5. Launch fresh application runtime environment
            echo "Launching updated NewsScribe container with volume attachments..."
            docker run -d \
              --name newsscribe-backend-inst \
              -p 8000:8000 \
              -v /home/ubuntu/model_weights:/app/model_weights \
              -v /home/ubuntu/sentiment_model:/app/sentiment_model \
              --restart unless-stopped \
              $DOCKER_USER/newsscribe-backend:latest

            # 6. Garbage Collection 
            echo "Purging stale infrastructure build artifacts..."
            docker image prune -f