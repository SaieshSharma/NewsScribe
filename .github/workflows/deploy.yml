name: NewsScribe Continuous Deployment Loop

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/**' # Automatically catches any workflow file iteration changes

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Authenticate to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Light App Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/newsscribe-backend:latest

      - name: Execute Live Remote Server Swap via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Injecting the secret as a clean, lowercase-safe environment string safely bridged into the shell scope
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          envs: DOCKER_USER # Expressly tells appleboy to pass this local variable over to the EC2 server session
          script: |
            # 1. Clear out any running container holding port 8000 or using our name target
            echo "Stopping old deployment container layers..."
            docker rm -f $(docker ps -q --filter "publish=8000") || true
            docker rm -f newsscribe-backend-inst || true
            
            # 2. FORCE PURGE the local cached image layer so it doesn't trick the pull mechanism
            echo "Purging old cached image from EC2 host..."
            docker rmi -f $DOCKER_USER/newsscribe-backend:latest || true
            
            # 3. Pull down the fresh app image from DockerHub over the wire
            echo "Pulling down fresh application build layer..."
            docker pull $DOCKER_USER/newsscribe-backend:latest
            
            # 4. Spin up the new application container layer mapping host-persistent ML weights
            echo "Launching updated NewsScribe container with volume attachments..."
            docker run -d \
              --name newsscribe-backend-inst \
              -p 8000:8000 \
              -v /home/ubuntu/model_weights:/app/model_weights \
              -v /home/ubuntu/sentiment_model:/app/sentiment_model \
              --restart unless-stopped \
              $DOCKER_USER/newsscribe-backend:latest

            # 5. Garbage Collection (Aggressive disk hygiene layer)
            echo "Purging stale infrastructure build artifacts..."
            docker image prune -a -f