name: NewsScribe Continuous Deployment Loop

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
      
jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Authenticate to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Light App Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/newsscribe-backend:latest

      - name: Execute Live Remote Server Swap via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            # Pull down the freshly baked app image from DockerHub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/newsscribe-backend:latest
            
            # 1. Clear out any container holding port 8000
            echo "Clearing out existing port 8000 holders..."
            docker rm -f $(docker ps -q --filter "publish=8000") || true
            
            # 2. Clear out any dead container hogging our target name
            echo "Clearing out any name conflicts..."
            docker rm -f newsscribe-backend-inst || true
            
            # 3. Spin up the new application container layer
            echo "Launching updated NewsScribe container..."
            docker run -d \
              --name newsscribe-backend-inst \
              -p 8000:8000 \
              -v /home/ubuntu/model_weights:/app/model_weights \
              -v /home/ubuntu/sentiment_model:/app/sentiment_model \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/newsscribe-backend:latest

            # 4. Garbage Collection (Edge Case Fix)
            # Forcefully purge unused dangling images and build caches to keep EC2 storage free
            echo "Purging stale infrastructure image layers..."
            docker image prune -a -f